  <text x="345" y="643" fill="#94a3b8" font-size="9" text-anchor="middle">experiment.db</text>
  <text x="345" y="658" fill="#94a3b8" font-size="8" text-anchor="middle">runs · conventions · analysis · comparisons</text>
  <text x="345" y="672" fill="#a78bfa" font-size="8" text-anchor="middle">infrastructure_error · error_detail · failure_kind</text>

  <rect x="530" y="600" width="240" height="80" rx="6" fill="#0f172a"/>
  <rect x="530" y="600" width="240" height="80" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="650" y="625" fill="white" font-size="12" font-weight="600" text-anchor="middle">Artifacts</text>
  <text x="650" y="643" fill="#94a3b8" font-size="9" text-anchor="middle">agent_stdout.log · agent_stderr.log</text>
  <text x="650" y="658" fill="#94a3b8" font-size="9" text-anchor="middle">git_diff.patch · run_meta.json</text>
  <text x="650" y="672" fill="#94a3b8" font-size="9" text-anchor="middle">tests.json · judge_input.json</text>

  <!-- Arrow: Eval → Storage -->
  <line x1="400" y1="560" x2="345" y2="598" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="755" y1="510" x2="650" y2="598" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ===== Judge (Rose dashed - separate step) ===== -->
