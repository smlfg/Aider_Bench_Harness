  <line x1="285" y1="485" x2="318" y2="485" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arr-amber)"/>
  <line x1="480" y1="485" x2="513" y2="485" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arr-amber)"/>
  <line x1="655" y1="485" x2="688" y2="485" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arr-amber)"/>

