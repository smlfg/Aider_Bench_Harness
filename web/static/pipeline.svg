  <rect x="200" y="742" width="14" height="10" rx="2" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1"/>
  <text x="222" y="751" fill="#94a3b8" font-size="8">Backend / Agent</text>

  <rect x="340" y="742" width="14" height="10" rx="2" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1"/>
  <text x="362" y="751" fill="#94a3b8" font-size="8">Cloud / Eval</text>

  <rect x="470" y="742" width="14" height="10" rx="2" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1"/>
  <text x="492" y="751" fill="#94a3b8" font-size="8">Storage</text>

  <rect x="570" y="742" width="14" height="10" rx="2" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1"/>
  <text x="592" y="751" fill="#94a3b8" font-size="8">Auth / Error</text>

  <line x1="700" y1="747" x2="730" y2="747" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="738" y="751" fill="#94a3b8" font-size="8">Fehler-Pfad</text>

  <line x1="60" y1="772" x2="90" y2="772" stroke="#34d399" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="98" y="776" fill="#94a3b8" font-size="8">Optionaler Pfad (--skip-eval)</text>

  <text x="60" y="800" fill="#475569" font-size="8">Harness Eval Dashboard · Eval-Pipeline · MiniMax-M2.7 · SWE-bench Lite</text>
</svg>