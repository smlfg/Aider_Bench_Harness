  <text x="630" y="214" fill="#fbbf24" font-size="8" text-anchor="middle">HTTPS POST</text>

  <!-- Arrow: MiniMax response -->
  <line x1="758" y1="260" x2="500" y2="260" stroke="#34d399" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="630" y="254" fill="#94a3b8" font-size="8" text-anchor="middle">tokens + completion</text>

  <!-- ===== ERROR PATH: Auth Fail (Rose dashed) ===== -->
  <rect x="770" y="310" width="155" height="62" rx="6" fill="#0f172a"/>
  <rect x="770" y="310" width="155" height="62" rx="6" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="847" y="334" fill="#fb7185" font-size="10" font-weight="600" text-anchor="middle">401 Auth Error</text>
  <text x="847" y="352" fill="#94a3b8" font-size="8" text-anchor="middle">authorized_error (1004)</text>
  <text x="847" y="364" fill="#94a3b8" font-size="8" text-anchor="middle">login fail · APIConnectionError</text>

  <!-- Dashed arrow: MiniMax → Error -->
  <path d="M 845 285 L 845 308" fill="none" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="5,5" marker-end="url(#arr-rose)"/>
  <text x="862" y="300" fill="#fb7185" font-size="7">×</text>

