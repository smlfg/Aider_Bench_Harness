<svg viewBox="0 0 960 820" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', monospace">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arr-rose" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb7185"/>
    </marker>
    <marker id="arr-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
    </marker>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#020617"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- ===== ROW 1: Dashboard (Cyan) ===== -->
  <!-- Opaque bg to mask arrows -->
  <rect x="260" y="30" width="440" height="100" rx="6" fill="#0f172a"/>
  <rect x="260" y="30" width="440" height="100" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="480" y="58" fill="white" font-size="13" font-weight="700" text-anchor="middle">Dashboard</text>
  <text x="480" y="76" fill="#94a3b8" font-size="10" text-anchor="middle">FastAPI :8420</text>
  <text x="480" y="94" fill="#94a3b8" font-size="9" text-anchor="middle">Live Monitor · Debrief · Iteration · Trajectory</text>
  <text x="480" y="112" fill="#22d3ee" font-size="8" text-anchor="middle">Preflight-Checks · Error-Detail · Infra-Badge</text>

  <!-- ===== ROW 2: run_once / Aider (Emerald) ===== -->
  <!-- Boundary box -->
  <rect x="60" y="175" width="680" height="170" rx="10" fill="transparent" stroke="#34d399" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="72" y="192" fill="#34d399" font-size="9" font-weight="600">run_once.py</text>

  <!-- Aider box -->
  <rect x="90" y="205" width="200" height="70" rx="6" fill="#0f172a"/>
  <rect x="90" y="205" width="200" height="70" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="190" y="230" fill="white" font-size="11" font-weight="600" text-anchor="middle">Aider</text>
  <text x="190" y="248" fill="#94a3b8" font-size="9" text-anchor="middle">--model minimax/MiniMax-M2.7</text>
  <text x="190" y="262" fill="#94a3b8" font-size="9" text-anchor="middle">--read CONVENTIONS.md</text>

  <!-- LiteLLM box -->
  <rect x="340" y="205" width="160" height="70" rx="6" fill="#0f172a"/>
  <rect x="340" y="205" width="160" height="70" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="420" y="230" fill="white" font-size="11" font-weight="600" text-anchor="middle">LiteLLM</text>
  <text x="420" y="248" fill="#94a3b8" font-size="9" text-anchor="middle">Provider Router</text>
  <text x="420" y="262" fill="#34d399" font-size="8" text-anchor="middle">MINIMAX_API_KEY</text>

  <!-- git diff box -->
  <rect x="540" y="205" width="170" height="70" rx="6" fill="#0f172a"/>
  <rect x="540" y="205" width="170" height="70" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="625" y="230" fill="white" font-size="11" font-weight="600" text-anchor="middle">git diff</text>
  <text x="625" y="248" fill="#94a3b8" font-size="9" text-anchor="middle">→ Patch</text>
  <text x="625" y="262" fill="#94a3b8" font-size="9" text-anchor="middle">→ predictions.jsonl</text>

