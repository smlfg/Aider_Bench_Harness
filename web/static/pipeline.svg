  <text x="400" y="493" fill="#94a3b8" font-size="7" text-anchor="middle">Base → Env → Instance</text>
  <text x="400" y="504" fill="#fbbf24" font-size="7" text-anchor="middle">3-Layer Build (cached)</text>

