  <rect x="515" y="460" width="140" height="50" rx="6" fill="#0f172a"/>
  <rect x="515" y="460" width="140" height="50" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
