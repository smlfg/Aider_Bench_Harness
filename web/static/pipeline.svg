  <rect x="70" y="610" width="100" height="55" rx="6" fill="#0f172a"/>
  <rect x="70" y="610" width="100" height="55" rx="6" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="120" y="632" fill="#fb7185" font-size="10" font-weight="600" text-anchor="middle">Judge</text>
  <text x="120" y="648" fill="#94a3b8" font-size="8" text-anchor="middle">harness-judge</text>
  <text x="120" y="660" fill="#94a3b8" font-size="8" text-anchor="middle">separat!</text>
  <text x="120" y="604" fill="#fb7185" font-size="8" text-anchor="middle">optional</text>

  <!-- Dashed arrow: Judge → SQLite -->
  <path d="M 170 645 Q 185 645 198 640" fill="none" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="5,5" marker-end="url(#arr-rose)"/>
  <text x="184" y="638" fill="#fb7185" font-size="7">judge_score</text>

  <!-- ===== ROW 2 → ROW 4 direct (skip_eval path) ===== -->
  <path d="M 625 275 L 625 400 Q 625 420 600 420 L 560 420 Q 540 420 540 440 L 540 460" fill="none" stroke="#34d399" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr)"/>
  <text x="640" y="385" fill="#34d399" font-size="8" text-anchor="start">skip_eval?</text>
  <text x="640" y="397" fill="#94a3b8" font-size="7" text-anchor="start">direct to</text>
  <text x="640" y="407" fill="#94a3b8" font-size="7" text-anchor="start">artifacts</text>

  <!-- ===== LEGEND ===== -->
  <text x="60" y="730" fill="white" font-size="10" font-weight="600">Legende</text>

  <rect x="60" y="742" width="14" height="10" rx="2" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1"/>
