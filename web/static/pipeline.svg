  <path d="M 847 310 L 847 120 Q 847 80 700 80" fill="none" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="5,5" marker-end="url(#arr-rose)"/>
  <text x="800" y="108" fill="#fb7185" font-size="8">error_detail</text>

