  <text x="314" y="234" fill="#94a3b8" font-size="8" text-anchor="middle">route</text>
  <line x1="500" y1="240" x2="538" y2="240" stroke="#34d399" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="519" y="234" fill="#94a3b8" font-size="8" text-anchor="middle">diff</text>

