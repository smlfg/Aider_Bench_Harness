  <rect x="690" y="460" width="130" height="50" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="755" y="478" fill="white" font-size="10" font-weight="600" text-anchor="middle">report.json</text>
  <text x="755" y="493" fill="#94a3b8" font-size="8" text-anchor="middle">resolved: bool</text>
  <text x="755" y="503" fill="#94a3b8" font-size="8" text-anchor="middle">tests_status</text>

