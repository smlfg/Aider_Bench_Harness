  <rect x="760" y="195" width="170" height="90" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="845" y="222" fill="white" font-size="11" font-weight="600" text-anchor="middle">MiniMax M2.7</text>
  <text x="845" y="240" fill="#94a3b8" font-size="9" text-anchor="middle">api.minimax.io/v1</text>
  <text x="845" y="258" fill="#fbbf24" font-size="8" text-anchor="middle">chat/completions</text>
  <text x="845" y="274" fill="#94a3b8" font-size="8" text-anchor="middle">Authorization: Bearer sk-cp-…</text>

